<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="স্থানীয় অর্ডার ব্যবস্থাপনা অ্যাপ্লিকেশন — অফলাইন সাপোর্ট সহ" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="অর্ডার" />

    <title>অর্ডার ব্যবস্থাপনা</title>

    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <link rel="stylesheet" href="css/app.css" />
    <style>
        body { margin: 0; background: #0f172a; }

        .loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            gap: 20px;
            z-index: 9999;
        }

        .loading-logo {
            font-size: 52px;
            animation: pulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(99,102,241,0.6));
        }

        .loading-title {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: #1e293b;
            border-radius: 999px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #c084fc);
            border-radius: 999px;
            animation: loadBar 2s ease-in-out infinite;
        }

        .loading-sub {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 13px;
            color: #64748b;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes loadBar {
            0%   { width: 0%; margin-left: 0; }
            50%  { width: 70%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Initial loading screen shown while Blazor WASM loads -->
        <div class="loading-screen">
            <div class="loading-logo">📦</div>
            <div class="loading-title">অর্ডার ব্যবস্থাপনা</div>
            <div class="loading-bar">
                <div class="loading-bar-fill"></div>
            </div>
            <div class="loading-sub">লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        একটি অপ্রত্যাশিত ত্রুটি ঘটেছে। পেজটি পুনরায় লোড করুন।
        <a href="" class="reload">পুনরায় লোড করুন</a>
        <a class="dismiss">✕</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
